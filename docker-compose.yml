version: "3.9"

services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rag-ai-assistant
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist FAISS index across container restarts
      - faiss_data:/app/data/faiss_index
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  faiss_data:
    driver: local
